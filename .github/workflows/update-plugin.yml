name: Update plugin version

on:
  repository_dispatch:
    types: [plugin-update]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update version in marketplace.json
        run: |
          PLUGIN="${{ github.event.client_payload.plugin }}"
          VERSION="${{ github.event.client_payload.version }}"

          echo "Updating $PLUGIN to $VERSION"

          python3 -c "
          import json
          with open('.claude-plugin/marketplace.json') as f:
              data = json.load(f)
          for p in data['plugins']:
              if p['name'] == '$PLUGIN':
                  p['version'] = '$VERSION'
                  p['source']['ref'] = 'v$VERSION'
                  break
          with open('.claude-plugin/marketplace.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update ${{ github.event.client_payload.plugin }} to v${{ github.event.client_payload.version }}"
          git push
